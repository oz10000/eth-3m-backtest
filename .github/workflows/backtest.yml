name: ETH 3m Dual Backtest

on:
  workflow_dispatch:

jobs:
  run-backtest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - run: python -m pip install --upgrade pip

      - run: pip install -r requirements.txt

      - run: python backtest.py
